<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka školního bufetu</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f7fb;
}
h1 {
  text-align: center;
  background: #2a72d4;
  color: white;
  padding: 20px;
}
.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}
.item {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
}
input[type="number"] {
  width: 60px;
}
input[type="text"], input[type="tel"] {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
#celkem, #pocet {
  text-align: center;
  font-size: 20px;
  margin-top: 10px;
}
button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  font-size: 20px;
  background: #ff6b35;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>SŠ Kostka – OBJEDNÁVKY BUFET</h1>

<div class="container">

<div id="items"></div>

<div id="celkem">Celková cena: 0 Kč</div>
<div id="pocet">Počet kusů: 0</div>

<!-- ✅ NOVÁ VSTUPNÍ POLE -->
<input type="text" id="jmeno" placeholder="Příjmení Jméno" required>
<input type="tel" id="telefon" placeholder="+420 000 000 000" required>

<button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>

</div>

<script>

let items = [];

// načtení CSV
async function loadCSV() {
  const response = await fetch("data_bufet.csv?t=" + Date.now());
  const text = await response.text();
  parseCSV(text);
  renderItems();
}

// parsování CSV
function parseCSV(text) {
  const lines = text.split("\n");
  items = [];

  for (let i = 1; i < lines.length; i++) {
    const [nazev, cena] = lines[i].split(";");
    if (nazev && cena) {
      items.push({
        nazev: nazev.trim(),
        cena: parseFloat(cena),
        mnozstvi: 0
      });
    }
  }
}

// render položek
function renderItems() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  items.forEach((item, index) => {
    container.innerHTML += `
      <div class="item">
        ${item.nazev} (${item.cena} Kč)
        <input type="number" min="0" value="0"
        onchange="updateItem(${index}, this.value)">
      </div>`;
  });
}

// update položky
function updateItem(index, value) {
  items[index].mnozstvi = parseInt(value) || 0;
  updateSummary();
}

// přepočet
function updateSummary() {
  let celkem = 0;
  let pocet = 0;

  items.forEach(item => {
    celkem += item.cena * item.mnozstvi;
    pocet += item.mnozstvi;
  });

  document.getElementById("celkem").innerText =
    "Celková cena: " + celkem.toFixed(2) + " Kč";

  document.getElementById("pocet").innerText =
    "Počet kusů: " + pocet;
}

// ✅ MAILTO LOGIKA
function odeslatObjednavku() {

  const jmeno = document.getElementById("jmeno").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  // ✅ validace
  if (!jmeno || !telefon) {
    alert("Vyplňte jméno a telefon.");
    return;
  }

  let celkem = 0;
  let pocet = 0;

  const vybrane = items.filter(i => i.mnozstvi > 0);

  if (vybrane.length === 0) {
    alert("Nevybrali jste žádnou položku.");
    return;
  }

  let text = `Objednávka bufet\n\n`;
  text += `Jméno: ${jmeno}\nTelefon: ${telefon}\n\n`;

  vybrane.forEach(item => {
    text += `${item.nazev}: ${item.mnozstvi} ks (${item.cena} Kč)\n`;
    celkem += item.cena * item.mnozstvi;
    pocet += item.mnozstvi;
  });

  text += `\nPočet kusů: ${pocet}`;
  text += `\nCelková cena: ${celkem.toFixed(2)} Kč`;

  // ✅ mailto odkaz
  const mailto =
    `mailto:machalek.roman@kostka-skola.cz` +
    `?subject=${encodeURIComponent("Objednávka bufet")}` +
    `&body=${encodeURIComponent(text)}`;

  window.location.href = mailto;
}

loadCSV();

</script>

</body>
</html>
